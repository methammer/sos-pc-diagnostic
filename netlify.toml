[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/diag.ps1"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Content-Disposition = "inline"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://sos-pc.click"
